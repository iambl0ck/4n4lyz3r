name: Build 4n4lyz3r Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # Allows manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        cache: 'pip' # caching pip dependencies

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Compile Executable
      run: python build.py

    - name: Rename Output Binary (Linux)
      if: runner.os == 'Linux'
      run: mv dist/4n4lyz3r dist/4n4lyz3r-linux-x64

    - name: Bundle Output Binary (macOS)
      if: runner.os == 'macOS'
      run: |
        cd dist
        zip -r 4n4lyz3r-macos-x64.zip 4n4lyz3r.app

    - name: Rename Output Binary (Windows)
      if: runner.os == 'Windows'
      run: Move-Item -Path dist\4n4lyz3r.exe -Destination dist\4n4lyz3r-windows-x64.exe

    - name: Upload Artifact (Linux/Windows)
      if: runner.os != 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: 4n4lyz3r-binary-${{ matrix.os }}
        path: dist/4n4lyz3r-*
        retention-days: 7

    - name: Upload Artifact (macOS)
      if: runner.os == 'macOS'
      uses: actions/upload-artifact@v4
      with:
        name: 4n4lyz3r-binary-macos-latest
        path: dist/4n4lyz3r-macos-x64.zip
        retention-days: 7
